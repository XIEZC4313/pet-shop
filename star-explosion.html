<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Star Explosion</title>
<style>
  * { margin: 0; padding: 0; }
  body { background: #000; overflow: hidden; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Stars background
const stars = Array.from({ length: 400 }, () => ({
  x: Math.random() * W,
  y: Math.random() * H,
  r: Math.random() * 1.5 + 0.3,
  twinkle: Math.random() * Math.PI * 2
}));

// Particle system
let particles = [];
let explosionTriggered = false;
let time = 0;
let shockwaveRadius = 0;
let shockwaveAlpha = 1;
let coreAlpha = 1;
let coreRadius = 30;
let phase = 'waiting'; // waiting -> brightening -> explosion -> expanding -> fading

// Central star
let starBrightness = 0;
let starGlowRadius = 40;

class Particle {
  constructor(x, y, angle, speed, size, color, life) {
    this.x = x;
    this.y = y;
    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed;
    this.size = size;
    this.color = color;
    this.life = life;
    this.maxLife = life;
    this.decay = 0.97;
    this.trail = [];
  }
  update() {
    this.trail.push({ x: this.x, y: this.y });
    if (this.trail.length > 6) this.trail.shift();
    this.x += this.vx;
    this.y += this.vy;
    this.vx *= this.decay;
    this.vy *= this.decay;
    this.life--;
  }
  draw() {
    const alpha = Math.max(0, this.life / this.maxLife);
    // trail
    for (let i = 0; i < this.trail.length; i++) {
      const t = i / this.trail.length;
      ctx.beginPath();
      ctx.arc(this.trail[i].x, this.trail[i].y, this.size * t * 0.5, 0, Math.PI * 2);
      ctx.fillStyle = this.color.replace('1)', `${alpha * t * 0.3})`);
      ctx.fill();
    }
    // main particle
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * alpha, 0, Math.PI * 2);
    ctx.fillStyle = this.color.replace('1)', `${alpha})`);
    ctx.fill();
  }
}

function createExplosion(cx, cy) {
  const colors = [
    'rgba(255, 255, 255, 1)',
    'rgba(255, 240, 200, 1)',
    'rgba(255, 200, 100, 1)',
    'rgba(255, 150, 50, 1)',
    'rgba(255, 80, 30, 1)',
    'rgba(200, 100, 255, 1)',
    'rgba(100, 150, 255, 1)',
    'rgba(255, 50, 50, 1)',
    'rgba(50, 200, 255, 1)',
  ];
  // main burst
  for (let i = 0; i < 300; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 12 + 2;
    const size = Math.random() * 3 + 1;
    const color = colors[Math.floor(Math.random() * colors.length)];
    const life = Math.random() * 120 + 60;
    particles.push(new Particle(cx, cy, angle, speed, size, color, life));
  }
  // fast outer ring
  for (let i = 0; i < 100; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 6 + 10;
    const size = Math.random() * 1.5 + 0.5;
    const color = 'rgba(200, 220, 255, 1)';
    const life = Math.random() * 80 + 40;
    particles.push(new Particle(cx, cy, angle, speed, size, color, life));
  }
  // slow inner debris
  for (let i = 0; i < 150; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 3 + 0.5;
    const size = Math.random() * 4 + 2;
    const color = colors[Math.floor(Math.random() * 3)];
    const life = Math.random() * 180 + 80;
    particles.push(new Particle(cx, cy, angle, speed, size, color, life));
  }
}

function drawStars() {
  stars.forEach(s => {
    s.twinkle += 0.02;
    const alpha = 0.5 + Math.sin(s.twinkle) * 0.3;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
    ctx.fill();
  });
}

function drawCentralStar(cx, cy) {
  // glow layers
  const glowSize = starGlowRadius;
  const gradient = ctx.createRadialGradient(cx, cy, 0, cx, cy, glowSize);
  gradient.addColorStop(0, `rgba(255, 255, 255, ${starBrightness})`);
  gradient.addColorStop(0.2, `rgba(255, 240, 200, ${starBrightness * 0.8})`);
  gradient.addColorStop(0.5, `rgba(255, 180, 80, ${starBrightness * 0.4})`);
  gradient.addColorStop(1, 'rgba(255, 100, 30, 0)');
  ctx.beginPath();
  ctx.arc(cx, cy, glowSize, 0, Math.PI * 2);
  ctx.fillStyle = gradient;
  ctx.fill();

  // core
  ctx.beginPath();
  ctx.arc(cx, cy, coreRadius * coreAlpha, 0, Math.PI * 2);
  const cg = ctx.createRadialGradient(cx, cy, 0, cx, cy, coreRadius * coreAlpha);
  cg.addColorStop(0, `rgba(255, 255, 255, ${coreAlpha})`);
  cg.addColorStop(0.6, `rgba(255, 220, 150, ${coreAlpha * 0.7})`);
  cg.addColorStop(1, `rgba(255, 150, 50, 0)`);
  ctx.fillStyle = cg;
  ctx.fill();
}

function drawShockwave(cx, cy) {
  if (shockwaveRadius > 0 && shockwaveAlpha > 0) {
    ctx.beginPath();
    ctx.arc(cx, cy, shockwaveRadius, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(200, 220, 255, ${shockwaveAlpha})`;
    ctx.lineWidth = 3 + (1 - shockwaveAlpha) * 5;
    ctx.stroke();
    // second ring
    ctx.beginPath();
    ctx.arc(cx, cy, shockwaveRadius * 0.85, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(255, 200, 150, ${shockwaveAlpha * 0.5})`;
    ctx.lineWidth = 2;
    ctx.stroke();
  }
}

function drawFlash(cx, cy, alpha) {
  if (alpha <= 0) return;
  const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(W, H));
  g.addColorStop(0, `rgba(255, 255, 255, ${alpha})`);
  g.addColorStop(0.1, `rgba(255, 240, 200, ${alpha * 0.6})`);
  g.addColorStop(0.3, `rgba(255, 180, 100, ${alpha * 0.2})`);
  g.addColorStop(1, 'rgba(255, 100, 30, 0)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
}

let flashAlpha = 0;
let cx, cy;

function animate() {
  cx = W / 2;
  cy = H / 2;
  time++;

  // clear
  ctx.fillStyle = 'rgba(0, 0, 0, 1)';
  ctx.fillRect(0, 0, W, H);

  drawStars();

  // Phase management
  if (phase === 'waiting') {
    if (time > 30) phase = 'brightening';
  }

  if (phase === 'brightening') {
    starBrightness = Math.min(1, starBrightness + 0.02);
    starGlowRadius = 40 + starBrightness * 80;
    coreRadius = 30 + starBrightness * 20;
    if (starBrightness >= 1) {
      phase = 'explosion';
      flashAlpha = 1.2;
      createExplosion(cx, cy);
      shockwaveRadius = 1;
    }
  }

  if (phase === 'explosion') {
    coreAlpha = Math.max(0, coreAlpha - 0.03);
    shockwaveRadius += 8;
    shockwaveAlpha = Math.max(0, shockwaveAlpha - 0.008);
    flashAlpha = Math.max(0, flashAlpha - 0.025);
    if (particles.length === 0) phase = 'fading';
  }

  if (phase === 'fading') {
    shockwaveAlpha = Math.max(0, shockwaveAlpha - 0.01);
    flashAlpha = Math.max(0, flashAlpha - 0.01);
  }

  // Draw
  drawCentralStar(cx, cy);
  drawShockwave(cx, cy);
  drawFlash(cx, cy, flashAlpha);

  // Update & draw particles
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.update();
    p.draw();
  });

  // Nebula remnant after explosion
  if (phase === 'explosion' || phase === 'fading') {
    const nebulaAlpha = Math.max(0, 0.15 - time * 0.0005);
    if (nebulaAlpha > 0) {
      const ng = ctx.createRadialGradient(cx, cy, 0, cx, cy, 200);
      ng.addColorStop(0, `rgba(100, 50, 200, ${nebulaAlpha})`);
      ng.addColorStop(0.5, `rgba(50, 100, 200, ${nebulaAlpha * 0.5})`);
      ng.addColorStop(1, 'rgba(200, 50, 100, 0)');
      ctx.fillStyle = ng;
      ctx.fillRect(0, 0, W, H);
    }
  }

  requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
