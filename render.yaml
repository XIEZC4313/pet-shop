services:
  - type: web
    name: pet-shop-api
    env: node
    region: singapore
    rootDir: pet-shop-backend
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && node prisma/seed.js
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://pet-shop-frontend.vercel.app
      - key: DATABASE_URL
        fromDatabase:
          name: pet-shop-db
          property: connectionString
      - key: STRIPE_SECRET_KEY
        sync: false

databases:
  - name: pet-shop-db
    databaseName: pet_shop
    region: singapore
    plan: free
